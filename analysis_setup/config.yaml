# All paths are resolved relative to analysis_setup/
prefix: "500_example"              # <prefix> used in output names
pod5: "../data/example_pod5/500_example.pod5"

# Output directory one level above analysis_setup
outdir: "../out_example"
logdir: "../out_example/logs"

# Dorado settings
dorado_model: "../dorado-models/dna_r10.4.1_e8.2_400bps_hac@v5.2.0"
kit_name: "EXP-PBC001"
mm2_opts: "-x map-ont --secondary=no"

# References
tx_fasta: "../tb427_transcriptome/Transcriptome_with_117.fasta"
genome_fasta: "../tb427_genome/TriTrypDB-68_TbruceiLister427_2018_Genome.fasta"

# Adapter filtering / extraction
adapter_seq: "CTGTAGGCACCATCAAT"
min_mapq: 0
mm_max: 1
extract_n: 10

# Scripts (kept inside analysis_setup/scripts or sibling ../scripts)
filter_script: "scripts/filter_adapter_categorized.py"

# R helper dir (optional; your R script defaults to scripts/R_functions if omitted)
rfuns_dir: "scripts/R_functions"

# Optional thresholds for classification (used by your R script if you read from config)
pure_A_threshold: 0.95
min_run: 5
